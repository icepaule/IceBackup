<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .header {
      background: linear-gradient(135deg, #1a5276, #2e86c1);
      color: white;
      padding: 2rem 0;
      text-align: center;
    }
    .header h1 { margin: 0; font-size: 2rem; }
    .header p { margin: 0.5rem 0 0; opacity: 0.9; }
    .header a { color: white; }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .markdown-body {
      background: #161b22;
      color: #c9d1d9;
      padding: 2rem;
      border-radius: 8px;
    }
    .markdown-body a { color: #58a6ff; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      border-bottom-color: #30363d;
      color: #e6edf3;
    }
    .markdown-body code {
      background: #0d1117;
      color: #e6edf3;
    }
    .markdown-body pre {
      background: #0d1117;
      border: 1px solid #30363d;
    }
    .markdown-body table th, .markdown-body table td {
      border-color: #30363d;
    }
    .markdown-body table tr { background: #161b22; border-color: #30363d; }
    .markdown-body table tr:nth-child(2n) { background: #1c2128; }
    .markdown-body blockquote {
      color: #8b949e;
      border-left-color: #3b434b;
    }
    .nav { text-align: center; margin: 1rem 0; }
    .nav a {
      color: #58a6ff;
      margin: 0 0.5rem;
      text-decoration: none;
    }
    .nav a:hover { text-decoration: underline; }
    .mermaid {
      background: #ffffff !important;
      border-radius: 6px;
      padding: 1rem;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><a href="{{ '/' | relative_url }}">{{ site.title | default: "IceBackup" }}</a></h1>
    <p>{{ site.description }}</p>
  </div>
  <div class="container">
    <nav class="nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/docs/01-setup' | relative_url }}">Setup</a>
      <a href="{{ '/docs/02-operations' | relative_url }}">Operations</a>
      <a href="{{ '/docs/03-restore-vm' | relative_url }}">VM Restore</a>
      <a href="{{ '/docs/04-restore-baremetal' | relative_url }}">Bare-Metal</a>
      <a href="{{ '/docs/05-abb-integration' | relative_url }}">ABB</a>
      <a href="{{ '/docs/06-best-practices' | relative_url }}">Best Practices</a>
      <a href="{{ '/docs/07-troubleshooting' | relative_url }}">Troubleshooting</a>
      <a href="{{ '/docs/08-docker-compose-reference' | relative_url }}">Compose Ref</a>
      <a href="{{ '/docs/09-linux-agent-bare-metal' | relative_url }}">Linux Agent</a>
    </nav>
    <article class="markdown-body">
      {{ content }}
    </article>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: 'default',
      securityLevel: 'loose'
    });

    // Convert ```mermaid code blocks to mermaid divs
    document.querySelectorAll('pre > code.language-mermaid').forEach(function(el) {
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      el.parentElement.replaceWith(div);
    });
  </script>
</body>
</html>
